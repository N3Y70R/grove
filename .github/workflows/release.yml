name: release-python

# Publishes the Python implementation to PyPI and creates a GitHub Release
# when a tag like `python/v0.5.0` is pushed.
on:
  push:
    tags:
      - "python/v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # PyPI Trusted Publishing (OIDC) — no token needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          cd python && python -m build
          # quick sanity: the built files exist
          ls -l python/dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          # No password: uses OIDC. Configure a Trusted Publisher on PyPI for
          # project "grove-wt" pointing at this repo + workflow (see below).
          # To use an API token instead, delete the line above's note and add:
          #   password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python/dist/*
          generate_release_notes: true
